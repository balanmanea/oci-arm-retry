name: OCI ARM 搶機

on:
  workflow_dispatch:  # 只能手動觸發

concurrency:
  group: oci-retry            # 同 group 只允許一個 Job 執行
  cancel-in-progress: false   # 不取消正在跑的，新的排隊等候（最多 1 跑 + 1 等）

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 355      # 接近 GitHub Actions 上限 6 小時

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCI SDK
        run: pip install oci

      - name: Set up OCI credentials
        env:
          OCI_USER:        ${{ secrets.OCI_USER }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY:     ${{ secrets.OCI_TENANCY }}
          OCI_REGION:      ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci

          # 寫入 API 私密金鑰
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          # 寫入 config（key_file 使用絕對路徑）
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=$OCI_USER
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY
          region=$OCI_REGION
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

      - name: Run OCI retry script
        # 腳本成功（exit 0）→ 下一步自動停用 workflow
        # timeout 到期（exit 124）→ 視為 failure，下一步不執行
        id: run_script
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
        run: timeout 21000 python oci_retry.py

      - name: 成功後自動停用 workflow
        if: steps.run_script.outcome == 'success'
        run: |
          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/oci_retry.yml/disable
          echo "Workflow 已自動停用"

      - name: 觸發下一個 Job（無縫接力）
        if: steps.run_script.outcome != 'success'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/oci_retry.yml/dispatches \
            -d '{"ref":"main"}'
          echo "已觸發下一個 Job"
